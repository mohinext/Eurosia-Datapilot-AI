<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #05070F;
      color: white;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 16px 0;
      color: #3b82f6;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .input-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      margin-bottom: 6px;
      font-weight: bold;
    }
    textarea {
      width: 100%;
      height: 80px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px border rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: white;
      padding: 10px;
      box-sizing: border-box;
      resize: none;
      font-size: 13px;
      outline: none;
    }
    textarea:focus {
      border-color: #3b82f6;
    }
    button {
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #1d4ed8;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Eurosia Datapilot</h1>
  <div class="input-group">
    <label>Extraction Prompt</label>
    <textarea id="prompt" placeholder="e.g. Extract product names and prices..."></textarea>
  </div>
  <button id="extractBtn">Extract from Page</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
